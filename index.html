<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daisy — Knitted Bouquets, Dharan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --rose:       #B85469;
      --rose-dark:  #8B3650;
      --rose-soft:  #E8B4BC;
      --rose-pale:  #FAE8EC;
      --cream:      #FDF8F2;
      --beige:      #F0E4D4;
      --sage:       #7A9E6E;
      --dark:       #1C1212;
      --text:       #3B2929;
      --text-soft:  #7A5858;
      --shadow:     0 4px 24px rgba(184,84,105,0.09);
      --shadow-lg:  0 10px 48px rgba(184,84,105,0.16);
      --r:          16px;
      --r-sm:       8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; overflow-x: hidden; }

    /* NAV */
    nav { position: sticky; top: 0; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0.9rem 2rem; background: rgba(253,248,242,0.92); backdrop-filter: blur(14px); border-bottom: 1px solid rgba(184,84,105,0.10); }
    .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.75rem; font-weight: 600; letter-spacing: 0.05em; color: var(--rose); cursor: pointer; display: flex; align-items: center; gap: 0.35rem; }
    .nav-links { display: flex; gap: 1.8rem; list-style: none; }
    .nav-links a { text-decoration: none; color: var(--text); font-size: 0.82rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: color 0.2s; }
    .nav-links a:hover { color: var(--rose); }
    .cart-btn { position: relative; background: var(--rose); color: #fff; border: none; padding: 0.5rem 1.2rem; border-radius: 50px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 0.45rem; transition: all 0.2s; }
    .cart-btn:hover { background: var(--rose-dark); transform: translateY(-1px); }
    .cart-count { background: #fff; color: var(--rose); border-radius: 50%; width: 19px; height: 19px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; }

    /* BUTTONS */
    .btn-primary { background: var(--rose); color: #fff; border: none; padding: 0.85rem 2rem; border-radius: 50px; font-family: 'DM Sans', sans-serif; font-size: 0.92rem; font-weight: 500; cursor: pointer; transition: all 0.25s; display: inline-flex; align-items: center; gap: 0.45rem; text-decoration: none; }
    .btn-primary:hover { background: var(--rose-dark); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(184,84,105,0.30); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-outline { background: transparent; color: var(--rose); border: 1.5px solid var(--rose); padding: 0.85rem 2rem; border-radius: 50px; font-family: 'DM Sans', sans-serif; font-size: 0.92rem; font-weight: 500; cursor: pointer; transition: all 0.25s; display: inline-flex; align-items: center; gap: 0.45rem; }
    .btn-outline:hover { background: var(--rose-pale); transform: translateY(-2px); }
    .back-btn { background: none; border: none; color: var(--text-soft); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; cursor: pointer; padding: 0.4rem 0; display: inline-flex; align-items: center; gap: 0.4rem; transition: color 0.2s; margin-bottom: 1.5rem; }
    .back-btn:hover { color: var(--rose); }

    /* PAGE & ANIMATIONS */
    #app { min-height: calc(100vh - 65px); }
    .page { animation: fadeUp 0.35s ease both; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(22px); } to { opacity:1; transform:translateY(0); } }
    @keyframes float { 0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-18px) rotate(4deg);} }
    @keyframes pop { 0%{transform:scale(0.5);opacity:0;}80%{transform:scale(1.08);}100%{transform:scale(1);opacity:1;} }
    @keyframes spin { from{transform:rotate(0deg)}to{transform:rotate(360deg)} }

    /* SECTION HELPERS */
    .section { padding: 5rem 2rem; max-width: 1200px; margin: 0 auto; }
    .section-header { text-align: center; margin-bottom: 3rem; }
    .section-label { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--rose); margin-bottom: 0.5rem; }
    .section-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 600; color: var(--dark); line-height: 1.2; }

    /* HERO */
    .hero { min-height: 88vh; display: flex; align-items: center; padding: 4rem 2rem; overflow: hidden; position: relative; background: linear-gradient(130deg, var(--beige) 0%, var(--cream) 55%, var(--rose-pale) 100%); }
    .hero-content { max-width: 580px; position: relative; z-index: 2; padding: 2rem; animation: fadeUp 0.8s ease both; }
    .hero-badge { display: inline-flex; align-items: center; gap: 0.35rem; background: var(--rose); color: #fff; padding: 0.3rem 0.9rem; border-radius: 50px; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 1.5rem; }
    .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(3rem, 6vw, 5rem); font-weight: 600; line-height: 1.08; color: var(--dark); margin-bottom: 1rem; }
    .hero h1 em { font-style: italic; color: var(--rose); }
    .hero p { font-size: 1rem; color: var(--text-soft); line-height: 1.75; margin-bottom: 2rem; max-width: 460px; }
    .hero-actions { display: flex; gap: 0.85rem; flex-wrap: wrap; }
    .hero-visual { position: absolute; right: 0; top: 0; bottom: 0; width: 48%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .hero-circle { width: 520px; height: 520px; border-radius: 50%; background: radial-gradient(circle at 40% 40%, var(--rose-soft), var(--rose-pale)); position: absolute; right: -90px; display: flex; align-items: center; justify-content: center; font-size: 11rem; filter: drop-shadow(0 24px 64px rgba(184,84,105,0.18)); animation: float 7s ease-in-out infinite; }

    /* FEATURES STRIP */
    .features-strip { background: var(--dark); padding: 2.5rem 2rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 2rem; }
    .feat { text-align: center; color: var(--cream); }
    .feat-icon { font-size: 1.9rem; margin-bottom: 0.4rem; }
    .feat-title { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; font-weight: 600; color: var(--rose-soft); margin-bottom: 0.2rem; }
    .feat-desc { font-size: 0.78rem; color: rgba(253,248,242,0.55); line-height: 1.5; }

    /* CATEGORY PILLS */
    .cats { display: flex; gap: 0.65rem; flex-wrap: wrap; justify-content: center; margin-bottom: 2.5rem; }
    .cat-pill { display: flex; align-items: center; gap: 0.4rem; padding: 0.55rem 1.2rem; border-radius: 50px; background: #fff; border: 1.5px solid var(--beige); color: var(--text); font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .cat-pill:hover, .cat-pill.active { background: var(--rose); color: #fff; border-color: var(--rose); transform: translateY(-2px); box-shadow: var(--shadow); }

    /* PRODUCT GRID */
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(255px,1fr)); gap: 1.4rem; }
    .pcard { background: #fff; border-radius: var(--r); overflow: hidden; box-shadow: var(--shadow); transition: all 0.3s; cursor: pointer; position: relative; }
    .pcard:hover { transform: translateY(-7px); box-shadow: var(--shadow-lg); }
    .pcard-img-wrap { overflow: hidden; position: relative; }
    .pcard-img { width: 100%; aspect-ratio: 4/4.5; background: var(--beige); display: flex; align-items: center; justify-content: center; font-size: 5.5rem; transition: transform 0.4s; overflow: hidden; }
    .pcard-img img { width: 100%; height: 100%; object-fit: cover; }
    .pcard:hover .pcard-img { transform: scale(1.06); }
    .pcard-badge { position: absolute; top: 11px; left: 11px; background: var(--rose); color: #fff; font-size: 0.66rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 0.22rem 0.65rem; border-radius: 50px; }
    .pcard-oos { position: absolute; top: 11px; right: 11px; background: #EF4444; color: #fff; font-size: 0.66rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; padding: 0.22rem 0.65rem; border-radius: 50px; }
    .pcard-body { padding: 1.15rem; }
    .pcard-cat { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--rose); margin-bottom: 0.25rem; }
    .pcard-name { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 600; color: var(--dark); margin-bottom: 0.35rem; line-height: 1.2; }
    .pcard-price { font-size: 1rem; font-weight: 600; color: var(--rose); margin-bottom: 0.75rem; }
    .pcard-btn { width: 100%; background: var(--rose-pale); color: var(--rose); border: none; padding: 0.6rem; border-radius: var(--r-sm); font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 0.2s; letter-spacing: 0.03em; }
    .pcard-btn:hover { background: var(--rose); color: #fff; }

    /* CTA BANNER */
    .cta-banner { background: linear-gradient(135deg, var(--rose) 0%, #7A2940 100%); padding: 4rem 2rem; text-align: center; }

    /* PRODUCT DETAIL */
    .pdetail { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; padding: 3rem 2rem 5rem; max-width: 1100px; margin: 0 auto; }
    .pdetail-img { border-radius: var(--r); background: var(--beige); aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 10rem; position: sticky; top: 85px; overflow: hidden; }
    .pdetail-img img { width: 100%; height: 100%; object-fit: cover; }
    .pdetail-info h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.4rem; font-weight: 600; color: var(--dark); margin-bottom: 0.4rem; line-height: 1.15; }
    .pdetail-price { font-size: 1.55rem; font-weight: 600; color: var(--rose); margin-bottom: 1.4rem; }
    .pdetail-desc { color: var(--text-soft); line-height: 1.75; font-size: 0.93rem; margin-bottom: 1.8rem; }
    .sel-label { font-size: 0.76rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-soft); margin-bottom: 0.55rem; }
    .addon-wrap { margin-bottom: 1.6rem; }
    .addon-opts { display: flex; flex-direction: column; gap: 0.45rem; }
    .addon-opt { display: flex; align-items: center; gap: 0.7rem; padding: 0.7rem 0.9rem; border: 1.5px solid var(--beige); border-radius: var(--r-sm); cursor: pointer; background: #fff; transition: all 0.2s; }
    .addon-opt:hover { border-color: var(--rose-soft); background: var(--rose-pale); }
    .addon-opt.selected { border-color: var(--rose); background: var(--rose-pale); }
    .addon-opt input { accent-color: var(--rose); }
    .addon-name { flex: 1; font-size: 0.86rem; font-weight: 500; }
    .addon-price { font-size: 0.82rem; color: var(--rose); font-weight: 600; }

    /* CART */
    .cart-page { max-width: 780px; margin: 0 auto; padding: 3.5rem 2rem; }
    .cart-item { display: grid; grid-template-columns: 76px 1fr auto; gap: 1.1rem; align-items: center; padding: 1.1rem; background: #fff; border-radius: var(--r); margin-bottom: 0.9rem; box-shadow: var(--shadow); }
    .cart-item-img { width: 76px; height: 76px; border-radius: var(--r-sm); background: var(--beige); display: flex; align-items: center; justify-content: center; font-size: 2.3rem; overflow: hidden; }
    .cart-item-img img { width: 100%; height: 100%; object-fit: cover; }
    .cart-item-name { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 600; color: var(--dark); }
    .cart-item-sub { font-size: 0.78rem; color: var(--text-soft); margin-top: 0.2rem; }
    .cart-item-price { font-size: 1.05rem; font-weight: 700; color: var(--rose); text-align: right; }
    .cart-remove { background: none; border: none; color: var(--text-soft); cursor: pointer; font-size: 0.75rem; margin-top: 0.3rem; transition: color 0.2s; display: block; }
    .cart-remove:hover { color: var(--rose); }
    .cart-summary { background: #fff; border-radius: var(--r); padding: 1.4rem; box-shadow: var(--shadow); margin-top: 1.25rem; }
    .cart-total-row { display: flex; justify-content: space-between; align-items: center; font-size: 1.15rem; font-weight: 700; margin-bottom: 1rem; }

    /* CHECKOUT */
    .checkout-page { max-width: 620px; margin: 0 auto; padding: 3.5rem 2rem; }
    .form-group { margin-bottom: 1.1rem; }
    .form-label { display: block; font-size: 0.76rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-soft); margin-bottom: 0.38rem; }
    .form-input, .form-select, .form-textarea { width: 100%; padding: 0.8rem 0.95rem; border: 1.5px solid var(--beige); border-radius: var(--r-sm); font-family: 'DM Sans', sans-serif; font-size: 0.92rem; color: var(--text); background: #fff; outline: none; transition: border-color 0.2s; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--rose); }
    .form-textarea { resize: vertical; min-height: 76px; }
    .pay-opts { display: flex; flex-direction: column; gap: 0.65rem; margin-top: 0.4rem; }
    .pay-opt { display: flex; align-items: center; gap: 0.9rem; padding: 0.85rem 1.1rem; border: 1.5px solid var(--beige); border-radius: var(--r-sm); cursor: pointer; background: #fff; transition: all 0.2s; }
    .pay-opt:hover, .pay-opt.sel { border-color: var(--rose); background: var(--rose-pale); }
    .pay-opt input { accent-color: var(--rose); }
    .pay-name { font-weight: 600; font-size: 0.92rem; }
    .pay-desc { font-size: 0.74rem; color: var(--text-soft); }
    .order-summary-box { background: var(--beige); border-radius: var(--r-sm); padding: 1.15rem; margin-bottom: 1.4rem; }
    .sum-row { display: flex; justify-content: space-between; font-size: 0.86rem; margin-bottom: 0.4rem; }
    .sum-total { font-size: 1rem; font-weight: 700; }

    /* CONFIRM */
    .confirm-page { text-align: center; padding: 5rem 2rem; max-width: 580px; margin: 0 auto; }
    .confirm-icon { font-size: 5rem; margin-bottom: 1.4rem; animation: pop 0.5s ease both; }
    .confirm-title { font-family: 'Cormorant Garamond', serif; font-size: 2.4rem; font-weight: 600; color: var(--dark); margin-bottom: 0.8rem; }
    .confirm-id { background: var(--rose-pale); color: var(--rose); border-radius: var(--r-sm); padding: 0.4rem 1rem; font-weight: 700; display: inline-block; margin-bottom: 1.4rem; font-family: monospace; font-size: 0.95rem; }
    .confirm-box { background: #fff; border-radius: var(--r); padding: 1.4rem; text-align: left; box-shadow: var(--shadow); margin-bottom: 1.8rem; }
    .confirm-row { display: flex; gap: 0.5rem; font-size: 0.86rem; margin-bottom: 0.45rem; }
    .confirm-row strong { min-width: 90px; color: var(--dark); }
    .confirm-row span { color: var(--text-soft); }

    /* ABOUT / CONTACT */
    .about-hero { background: linear-gradient(135deg, var(--rose-pale), var(--beige)); padding: 5rem 2rem; text-align: center; }
    .contact-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(240px,1fr)); gap: 1.25rem; }
    .ccard { background: #fff; border-radius: var(--r); padding: 2rem; text-align: center; box-shadow: var(--shadow); }
    .ccard-icon { font-size: 2.2rem; margin-bottom: 0.7rem; }
    .ccard-title { font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; font-weight: 600; color: var(--dark); margin-bottom: 0.4rem; }
    .ccard-val { color: var(--text-soft); font-size: 0.88rem; line-height: 1.65; }

    /* EMPTY STATE */
    .empty { text-align: center; padding: 4rem 2rem; color: var(--text-soft); }
    .empty-icon { font-size: 3.5rem; margin-bottom: 0.9rem; }
    .empty h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.45rem; color: var(--dark); margin-bottom: 0.4rem; }
    .empty p { font-size: 0.88rem; }

    /* FOOTER */
    footer { background: var(--dark); color: rgba(253,248,242,0.65); padding: 3rem 2rem; text-align: center; }
    .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.9rem; color: var(--rose-soft); margin-bottom: 0.6rem; }
    .footer-links { display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap; margin: 1rem 0; }
    .footer-links a { color: rgba(253,248,242,0.5); text-decoration: none; font-size: 0.82rem; cursor: pointer; transition: color 0.2s; }
    .footer-links a:hover { color: var(--rose-soft); }
    .footer-info { font-size: 0.8rem; margin-top: 0.75rem; }
    .footer-copy { font-size: 0.72rem; opacity: 0.35; margin-top: 0.75rem; }

    /* FAB STACK (WhatsApp + Instagram circles) */
    .fab-stack { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 999; display: flex; flex-direction: column; gap: 0.65rem; align-items: center; }
    .fab-btn { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; transition: all 0.25s; text-decoration: none; flex-shrink: 0; }
    .fab-wa { background: #25D366; box-shadow: 0 4px 20px rgba(37,211,102,0.45); animation: pulseWa 3s ease-in-out infinite; }
    .fab-ig { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fd5949 45%, #d6249f 60%, #285AEB 90%); box-shadow: 0 4px 20px rgba(214,36,159,0.35); }
    .fab-btn:hover { transform: scale(1.12) translateY(-2px); }
    .fab-btn svg { width: 24px; height: 24px; }
    @keyframes pulseWa { 0%,100%{box-shadow:0 4px 20px rgba(37,211,102,0.35);}50%{box-shadow:0 4px 32px rgba(37,211,102,0.65);} }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      nav { padding: 0.85rem 1rem; }
      .nav-links { display: none; }
      .hero { min-height: 72vh; }
      .hero-visual { display: none; }
      .pdetail { grid-template-columns: 1fr; gap: 1.8rem; }
      .pdetail-img { position: relative; top: 0; aspect-ratio: 4/3; font-size: 7rem; }
      .cart-item { grid-template-columns: 64px 1fr auto; gap: 0.75rem; }
    }
  </style>
</head>

  </a>
  <button class="fab-btn fab-wa" onclick="openWhatsApp()" title="Order on WhatsApp">

<script>
// ════════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════════
const GITHUB_RAW          = 'https://raw.githubusercontent.com/Daisy-flowers/Daisy/main/data/products.json';
const GITHUB_RAW_SETTINGS = 'https://raw.githubusercontent.com/Daisy-flowers/Daisy/main/data/settings.json';

let PRODUCTS = [];
const DEFAULT_PRODUCTS = []; // Admin adds real products — no fake defaults

// Load settings (delivery fee, eSewa phone) from localStorage
function loadSettings() {
  try { return JSON.parse(localStorage.getItem('daisy_settings') || '{}'); } catch { return {}; }
}
let SETTINGS = loadSettings();
function getDeliveryFee()    { return Number(SETTINGS.deliveryFee  ?? 100); }
function getFreeDeliveryAt() { return Number(SETTINGS.freeDeliveryAt ?? 1500); }

const ADDONS = [
  { id:'choc', name:'Chocolate Box', emoji:'🍫', price:200 },
  { id:'card', name:'Greeting Card', emoji:'💌', price:50  },
  { id:'bear', name:'Teddy Bear',    emoji:'🧸', price:350 },
];

const CATS = [
  { id:'all',         name:'All',         emoji:'💐' },
  { id:'birthday',    name:'Birthday',    emoji:'🎂' },
  { id:'wedding',     name:'Wedding',     emoji:'💍' },
  { id:'anniversary', name:'Anniversary', emoji:'❤️' },
  { id:'sympathy',    name:'Sympathy',    emoji:'🕊️' },
  { id:'custom',      name:'Custom',      emoji:'✨' },
];

// ════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════
let page          = 'home';
let currentProdId = null;
let currentOrder  = null;
let shopCat       = 'all';
let selectedAddons = [];

let cart   = JSON.parse(localStorage.getItem('daisy_cart')   || '[]');
let orders = JSON.parse(localStorage.getItem('daisy_orders') || '[]');

// ════════════════════════════════════════════════
//  NAVIGATE — with History API (back button fix)
// ════════════════════════════════════════════════
function navigate(p, data, fromPop=false) {
  page = p;
  if (p === 'product' && data != null) { currentProdId = data; selectedAddons = []; }
  if (p === 'confirm' && data != null) { currentOrder = data; }

  if (!fromPop) {
    const state = { page: p, prodId: currentProdId, shopCat };
    history.pushState(state, '', '#' + p + (p==='product' && data ? '-'+data : ''));
  }

  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

window.addEventListener('popstate', e => {
  if (e.state && e.state.page) {
    const s = e.state;
    page = s.page;
    if (s.prodId)   currentProdId = s.prodId;
    if (s.shopCat)  shopCat       = s.shopCat;
    render();
    window.scrollTo({ top: 0 });
  }
});

// ════════════════════════════════════════════════
//  CART HELPERS
// ════════════════════════════════════════════════
function saveCart()   { localStorage.setItem('daisy_cart',   JSON.stringify(cart));   syncCartCount(); }
function saveOrders() { localStorage.setItem('daisy_orders', JSON.stringify(orders)); }

function syncCartCount() {
  const el = document.getElementById('cartCount');
  if (el) el.textContent = cart.length;
}

function getPrice(p) { return p.price || p.base || (p.sizes && (p.sizes.Small || p.sizes.Standard)) || 0; }

function cartTotal()   { return cart.reduce((s,i)=>s+i.price,0); }
function deliveryFee() { return cartTotal() >= getFreeDeliveryAt() ? 0 : getDeliveryFee(); }
function orderTotal()  { return cartTotal() + deliveryFee(); }

function addToCart(prodId, addonIds) {
  const p = PRODUCTS.find(x=>x.id===prodId);
  if (!p) return;
  const base = getPrice(p);
  const ads = ADDONS.filter(a=>addonIds.includes(a.id));
  const addonCost = ads.reduce((s,a)=>s+a.price,0);
  cart.push({
    uid: Date.now() + Math.random(),
    prodId,
    name: p.name,
    emoji: p.emoji,
    imageUrl: p.imageUrl || '',
    price: base + addonCost,
    addons: ads.map(a=>a.name),
  });
  saveCart();
  toast('Added to cart 🛒');
}

function removeFromCart(uid) {
  cart = cart.filter(i=>i.uid!==uid);
  saveCart();
  render();
}

// ════════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════════
function toast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:5.5rem;left:50%;transform:translateX(-50%);background:#1C1212;color:#FDF8F2;padding:0.7rem 1.4rem;border-radius:50px;font-size:0.84rem;font-weight:500;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.2);animation:fadeUp 0.3s ease;white-space:nowrap;';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2400);
}

// ════════════════════════════════════════════════
//  WHATSAPP
// ════════════════════════════════════════════════
function openWhatsApp() {
  const msg = encodeURIComponent("Hello Daisy! 🌸 I'd like to order a knitted bouquet.");
  window.open(`https://wa.me/9779706348791?text=${msg}`, '_blank');
}

// ════════════════════════════════════════════════
//  RENDER ROUTER
// ════════════════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  switch (page) {
    case 'home':     app.innerHTML = homeHTML();    break;
    case 'shop':     app.innerHTML = shopHTML();    break;
    case 'product':  app.innerHTML = productHTML(); break;
    case 'cart':     app.innerHTML = cartHTML();    break;
    case 'checkout': app.innerHTML = checkoutHTML();break;
    case 'confirm':  app.innerHTML = confirmHTML(); break;
    case 'about':    app.innerHTML = aboutHTML();   break;
    case 'contact':  app.innerHTML = contactHTML(); break;
    default:         app.innerHTML = homeHTML();
  }
  syncCartCount();
}

// ════════════════════════════════════════════════
//  HOME
// ════════════════════════════════════════════════
function homeHTML() {
  // Use first 4 products safely (no crash if fewer)
  const featured = PRODUCTS.slice(0, 4);
  return `
  <div class="page">
    <section class="hero">
      <div class="hero-content">
        <div class="hero-badge">🧶 Handcrafted Knitted Bouquets</div>
        <h1>Bouquets That<br><em>Say It All</em></h1>
        <p>Beautifully knitted bouquets made to order — a lasting keepsake that never fades, crafted with care for every special moment.</p>
        <div class="hero-actions">
          <button class="btn-primary" onclick="navigate('shop')">Shop Bouquets →</button>
          <button class="btn-outline" onclick="openWhatsApp()">💬 Custom Order</button>
        </div>
      </div>
      <div class="hero-visual"><div class="hero-circle">💐</div></div>
    </section>

    <div class="features-strip">
      ${[['🧶','Knitted with Love','Each bouquet hand-crafted stitch by stitch'],['⏳','Made to Order','Crafted fresh for you, not mass-produced'],['🎨','Custom Designs','Pick colours, styles, and occasion'],['🛵','Home Delivery','We deliver to your door in Dharan']].map(([ic,t,d])=>`
        <div class="feat"><div class="feat-icon">${ic}</div><div class="feat-title">${t}</div><div class="feat-desc">${d}</div></div>
      `).join('')}
    </div>

    ${featured.length > 0 ? `
    <div class="section">
      <div class="section-header">
        <div class="section-label">Our Collection</div>
        <h2 class="section-title">Featured Bouquets</h2>
      </div>
      <div class="product-grid">${featured.map(pcardHTML).join('')}</div>
      <div style="text-align:center;margin-top:3rem;">
        <button class="btn-outline" onclick="navigate('shop')">View All Bouquets →</button>
      </div>
    </div>` : `
    <div class="section">
      <div class="section-header">
        <div class="section-label">Coming Soon</div>
        <h2 class="section-title">New Bouquets Arriving</h2>
        <p style="color:var(--text-soft);margin-top:0.65rem;">Our collection is being prepared. Message us on WhatsApp to place a custom order now!</p>
      </div>
      <div style="text-align:center;margin-top:2rem;">
        <button class="btn-primary" onclick="openWhatsApp()">💬 Order on WhatsApp</button>
      </div>
    </div>`}

    <div style="background:var(--beige);padding:4rem 2rem;">
      <div class="section-header">
        <div class="section-label">Shop by Occasion</div>
        <h2 class="section-title">What's the Moment?</h2>
      </div>
      <div class="cats" style="max-width:860px;margin:0 auto;">
        ${CATS.filter(c=>c.id!=='all').map(c=>`
          <button class="cat-pill" onclick="shopCat='${c.id}';navigate('shop')">${c.emoji} ${c.name}</button>
        `).join('')}
      </div>
    </div>

    <div class="cta-banner">
      <p style="font-size:0.72rem;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.65);margin-bottom:0.4rem;">Thoughtful Gift Idea</p>
      <h2 style="font-family:'Cormorant Garamond',serif;font-size:2.1rem;color:#fff;margin-bottom:1rem;">Knitted Bouquets Last Forever — Unlike Real Flowers 🌸</h2>
      <button class="btn-outline" style="border-color:#fff;color:#fff;" onclick="navigate('shop')">Shop Now</button>
    </div>
  </div>`;
}

// ════════════════════════════════════════════════
//  SHOP
// ════════════════════════════════════════════════
function shopHTML() {
  const list = shopCat==='all' ? PRODUCTS : PRODUCTS.filter(p=>p.cat===shopCat);
  return `
  <div class="page">
    <div class="section">
      <div class="section-header">
        <div class="section-label">Our Collection</div>
        <h2 class="section-title">Knitted Bouquets</h2>
      </div>
      <div class="cats">
        ${CATS.map(c=>`<button class="cat-pill ${shopCat===c.id?'active':''}" onclick="shopCat='${c.id}';navigate('shop')">${c.emoji} ${c.name}</button>`).join('')}
      </div>
      ${list.length===0
        ? `<div class="empty"><div class="empty-icon">🧶</div><h3>No bouquets yet</h3><p>Check back soon or message us for a custom order.</p><button class="btn-primary" style="margin-top:1.3rem;" onclick="openWhatsApp()">💬 Custom Order</button></div>`
        : `<div class="product-grid">${list.map(pcardHTML).join('')}</div>`
      }
    </div>
  </div>`;
}

// ════════════════════════════════════════════════
//  PRODUCT CARD
// ════════════════════════════════════════════════
function pcardHTML(p) {
  const price = getPrice(p);
  const isOOS = p.stock !== undefined && Number(p.stock) <= 0;
  const imgInner = p.imageUrl
    ? `<img src="${p.imageUrl}" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'">${isOOS?'':''}<span style="display:none;font-size:5.5rem;">${p.emoji}</span>`
    : p.emoji;
  return `
  <div class="pcard" onclick="navigate('product',${p.id})">
    <div class="pcard-img-wrap">
      <div class="pcard-img">${p.imageUrl ? `<img src="${p.imageUrl}" style="width:100%;height:100%;object-fit:cover;" onerror="this.outerHTML='<span style=font-size:5.5rem>${p.emoji}</span>'">` : p.emoji}</div>
      ${p.badge ? `<div class="pcard-badge">${p.badge}</div>` : ''}
      ${isOOS ? `<div class="pcard-oos">Out of Stock</div>` : ''}
    </div>
    <div class="pcard-body">
      <div class="pcard-cat">${p.cat}</div>
      <div class="pcard-name">${p.name}</div>
      <div class="pcard-price">Rs. ${price.toLocaleString()}</div>
      <button class="pcard-btn" onclick="event.stopPropagation();navigate('product',${p.id})">${isOOS ? 'View Details' : 'View & Order'}</button>
    </div>
  </div>`;
}

// ════════════════════════════════════════════════
//  PRODUCT DETAIL
// ════════════════════════════════════════════════
function productHTML() {
  const p = PRODUCTS.find(x=>x.id===currentProdId);
  if (!p) return '<div class="empty"><div class="empty-icon">🌾</div><h3>Bouquet not found</h3><button class="btn-primary" style="margin-top:1.3rem;" onclick="navigate(\'shop\')">Back to Shop</button></div>';
  const price = getPrice(p);
  const isOOS = p.stock !== undefined && Number(p.stock) <= 0;
  const imgContent = p.imageUrl
    ? `<img src="${p.imageUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:var(--r);" onerror="this.outerHTML='<span style=font-size:10rem>${p.emoji}</span>'">`
    : `<span style="font-size:10rem;">${p.emoji}</span>`;

  return `
  <div class="page">
    <div style="padding:1.2rem 2rem;max-width:1100px;margin:0 auto;">
      <button class="back-btn" onclick="navigate('shop')">← Back to Shop</button>
    </div>
    <div class="pdetail">
      <div class="pdetail-img">${imgContent}</div>
      <div class="pdetail-info">
        <div class="pcard-cat" style="margin-bottom:0.4rem;">${p.cat}</div>
        <h1>${p.name}</h1>
        ${p.badge ? `<div style="margin-bottom:0.6rem;"><span style="background:var(--rose);color:#fff;font-size:0.7rem;font-weight:700;padding:0.2rem 0.7rem;border-radius:50px;letter-spacing:0.06em;text-transform:uppercase;">${p.badge}</span></div>` : ''}
        <div class="pdetail-price" id="detailPrice">Rs. ${price.toLocaleString()}</div>
        <p class="pdetail-desc">${p.desc || 'A beautifully hand-knitted bouquet crafted with premium yarn and care.'}</p>

        ${isOOS ? `<div style="background:#FEE2E2;color:#DC2626;border-radius:var(--r-sm);padding:0.75rem 1rem;font-size:0.85rem;font-weight:600;margin-bottom:1.4rem;">⚠️ Currently out of stock — message us on WhatsApp to pre-order.</div>` : ''}

        <div class="addon-wrap">
          <div class="sel-label">Add-ons (Optional)</div>
          <div class="addon-opts">
            ${ADDONS.map(a=>`
              <label class="addon-opt" id="ao-${a.id}">
                <input type="checkbox" value="${a.id}" onchange="onAddonChange('ao-${a.id}')">
                <span style="font-size:1.2rem;">${a.emoji}</span>
                <span class="addon-name">${a.name}</span>
                <span class="addon-price">+Rs. ${a.price}</span>
              </label>
            `).join('')}
          </div>
        </div>

        ${!isOOS
          ? `<button class="btn-primary" style="width:100%;justify-content:center;padding:0.95rem;margin-bottom:0.65rem;" onclick="doAddToCart(${p.id})">Add to Cart 🛒</button>`
          : `<button class="btn-primary" disabled style="width:100%;justify-content:center;padding:0.95rem;margin-bottom:0.65rem;">Out of Stock</button>`
        }
        <button class="btn-outline" style="width:100%;justify-content:center;padding:0.95rem;" onclick="openWhatsApp()">💬 Order via WhatsApp</button>
      </div>
    </div>
  </div>`;
}

function onAddonChange(id) {
  const el = document.getElementById(id);
  const cb = el.querySelector('input[type=checkbox]');
  el.classList.toggle('selected', cb.checked);
  refreshDetailPrice();
}

function refreshDetailPrice() {
  const p = PRODUCTS.find(x=>x.id===currentProdId);
  if (!p) return;
  const base = getPrice(p);
  const extra = ADDONS.filter(a=>{
    const cb = document.querySelector(`input[value="${a.id}"]`);
    return cb && cb.checked;
  }).reduce((s,a)=>s+a.price,0);
  const el = document.getElementById('detailPrice');
  if (el) el.textContent = `Rs. ${(base+extra).toLocaleString()}`;
}

function doAddToCart(id) {
  const addonIds = ADDONS.filter(a=>{
    const cb = document.querySelector(`input[value="${a.id}"]`);
    return cb && cb.checked;
  }).map(a=>a.id);
  addToCart(id, addonIds);
}

// ════════════════════════════════════════════════
//  CART
// ════════════════════════════════════════════════
function cartHTML() {
  if (!cart.length) return `
    <div class="page cart-page">
      <h2 style="font-family:'Cormorant Garamond',serif;font-size:1.9rem;color:var(--dark);margin-bottom:2rem;">Your Cart</h2>
      <div class="empty"><div class="empty-icon">🛒</div><h3>Your cart is empty</h3><p>Discover our beautiful knitted bouquets</p><button class="btn-primary" style="margin-top:1.3rem;" onclick="navigate('shop')">Shop Now</button></div>
    </div>`;
  return `
  <div class="page cart-page">
    <h2 style="font-family:'Cormorant Garamond',serif;font-size:1.9rem;color:var(--dark);margin-bottom:1.5rem;">Your Cart (${cart.length})</h2>
    ${cart.map(item=>`
      <div class="cart-item">
        <div class="cart-item-img">
          ${item.imageUrl
            ? `<img src="${item.imageUrl}" onerror="this.outerHTML='<span style=font-size:2.3rem>${item.emoji}</span>'">`
            : item.emoji}
        </div>
        <div>
          <div class="cart-item-name">${item.name}</div>
          ${item.addons.length ? `<div class="cart-item-sub">+ ${item.addons.join(', ')}</div>` : ''}
        </div>
        <div>
          <div class="cart-item-price">Rs. ${item.price.toLocaleString()}</div>
          <button class="cart-remove" onclick="removeFromCart(${item.uid})">✕ Remove</button>
        </div>
      </div>
    `).join('')}
    <div class="cart-summary">
      <div class="cart-total-row">
        <span>Subtotal</span>
        <span>Rs. ${cartTotal().toLocaleString()}</span>
      </div>
      ${deliveryFee()===0
        ? `<p style="font-size:0.8rem;color:var(--sage);font-weight:600;margin-bottom:1rem;">✓ Free delivery!</p>`
        : `<div style="display:flex;justify-content:space-between;font-size:0.86rem;margin-bottom:0.5rem;"><span>Delivery</span><span>Rs. ${getDeliveryFee()}</span></div><p style="font-size:0.8rem;color:var(--text-soft);margin-bottom:1rem;">Add Rs. ${(getFreeDeliveryAt()-cartTotal()).toLocaleString()} more for free delivery 🛵</p>`
      }
      <div style="display:flex;justify-content:space-between;font-size:1.1rem;font-weight:700;margin-bottom:1rem;">
        <span>Total</span>
        <span style="color:var(--rose);">Rs. ${orderTotal().toLocaleString()}</span>
      </div>
      <button class="btn-primary" style="width:100%;justify-content:center;padding:0.95rem;" onclick="navigate('checkout')">Proceed to Checkout →</button>
    </div>
  </div>`;
}

// ════════════════════════════════════════════════
//  CHECKOUT
// ════════════════════════════════════════════════
function checkoutHTML() {
  const today = new Date().toISOString().split('T')[0];
  const ep = SETTINGS.esewaPhone || '';
  return `
  <div class="page checkout-page">
    <button class="back-btn" onclick="navigate('cart')">← Back to Cart</button>
    <h2 style="font-family:'Cormorant Garamond',serif;font-size:1.9rem;color:var(--dark);margin-bottom:1.6rem;">Checkout</h2>

function selPay(id) {
  document.querySelectorAll('.pay-opt').forEach(o=>o.classList.remove('sel'));
  const el = document.getElementById(id);
  if (el) el.classList.add('sel');
  const ep = document.getElementById('esewa-panel');
  if (ep) ep.style.display = id==='pop-esewa' ? 'block' : 'none';
}

// ── ESEWA DEEP LINK ──────────────────────────
function openEsewaApp(phone, amount) {
  const ua        = navigator.userAgent.toLowerCase();
  const isAndroid = /android/.test(ua);
  const isIOS     = /iphone|ipad|ipod/.test(ua);
  const schemeUrl = `esewa://p?mobile=${phone}&amount=${amount}`;

  if (isAndroid) {
    // Track whether the browser tab went into the background.
    // When eSewa opens, the browser fires visibilitychange → 'hidden'.
    // We only show the "not installed" toast if that never happens.
    let appLaunched = false;

    const onVisChange = () => {
      if (document.visibilityState === 'hidden') appLaunched = true;
    };
    document.addEventListener('visibilitychange', onVisChange);

    // Trigger the URL scheme via anchor click (avoids Play Store redirect)
    const a = document.createElement('a');
    a.href = schemeUrl;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    // After 3 s, clean up listener and warn only if app never launched
    setTimeout(() => {
      document.removeEventListener('visibilitychange', onVisChange);
      if (!appLaunched) {
        toast('eSewa didn\'t open — please install it from the Play Store 📲');
      }
    }, 3000);

  } else if (isIOS) {
    let appLaunched = false;
    const onVisChange = () => {
      if (document.visibilityState === 'hidden') appLaunched = true;
    };
    document.addEventListener('visibilitychange', onVisChange);
    window.location.href = schemeUrl;
    setTimeout(() => {
      document.removeEventListener('visibilitychange', onVisChange);
      if (!appLaunched) window.open('https://esewa.com.np', '_blank');
    }, 2500);

  } else {
    window.open('https://esewa.com.np', '_blank');
  }
}

function placeOrder() {
  const name  = document.getElementById('co-name').value.trim();
  const phone = document.getElementById('co-phone').value.trim();
  const addr  = document.getElementById('co-addr').value.trim();
  const date  = document.getElementById('co-date').value;
  if (!name||!phone||!addr||!date) { toast('Please fill all required fields ⚠️'); return; }

  const pay = document.querySelector('input[name="pay"]:checked').value;
  const id  = 'DSY' + Date.now().toString().slice(-6);
  const order = {
    id, name, phone, addr, date,
    msg: document.getElementById('co-msg').value.trim(),
    pay, items:[...cart], total: orderTotal(), status:'Processing',
    placed: new Date().toLocaleDateString('en-NP')
  };
  orders.unshift(order);
  saveOrders();
  cart = []; saveCart();
  navigate('confirm', order);
}

// ════════════════════════════════════════════════
//  INIT — load products + settings from GitHub
// ════════════════════════════════════════════════
async function initApp() {
  document.getElementById('app').innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:1rem;color:var(--text-soft);">
      <div style="font-size:2.5rem;animation:spin 1s linear infinite;">🌸</div>
      <p style="font-size:0.9rem;">Loading…</p>
    </div>`;

  // Try loading settings from GitHub
  try {
    const sr = await fetch(GITHUB_RAW_SETTINGS + '?t=' + Date.now());
    if (sr.ok) {
      const remoteSettings = await sr.json();
      SETTINGS = { ...SETTINGS, ...remoteSettings };
      localStorage.setItem('daisy_settings', JSON.stringify(SETTINGS));
    }
  } catch(e) { /* use localStorage settings */ }

  // Try loading products from GitHub
  try {
    const pr = await fetch(GITHUB_RAW + '?t=' + Date.now());
    if (pr.ok) {
      PRODUCTS = await pr.json();
    } else {
      PRODUCTS = DEFAULT_PRODUCTS;
    }
  } catch(e) {
    PRODUCTS = DEFAULT_PRODUCTS;
  }

  // Set initial history state
  history.replaceState({ page: 'home', prodId: null, shopCat: 'all' }, '', '#home');

  syncCartCount();
  render();
}

document.head.insertAdjacentHTML('beforeend', '<style>@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style>');
initApp();
