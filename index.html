<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daisy — Fresh Bouquets Delivered</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --rose:       #B85469;
      --rose-dark:  #8B3650;
      --rose-soft:  #E8B4BC;
      --rose-pale:  #FAE8EC;
      --cream:      #FDF8F2;
      --beige:      #F0E4D4;
      --sage:       #7A9E6E;
      --dark:       #1C1212;
      --text:       #3B2929;
      --text-soft:  #7A5858;
      --shadow:     0 4px 24px rgba(184,84,105,0.09);
      --shadow-lg:  0 10px 48px rgba(184,84,105,0.16);
      --r:          16px;
      --r-sm:       8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NAV ────────────────────────────────── */
    nav {
      position: sticky; top: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.9rem 2rem;
      background: rgba(253,248,242,0.90);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(184,84,105,0.10);
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.75rem; font-weight: 600; letter-spacing: 0.05em;
      color: var(--rose); cursor: pointer;
      display: flex; align-items: center; gap: 0.35rem;
    }
    .nav-links { display: flex; gap: 1.8rem; list-style: none; }
    .nav-links a {
      text-decoration: none; color: var(--text);
      font-size: 0.82rem; font-weight: 500;
      letter-spacing: 0.06em; text-transform: uppercase;
      cursor: pointer; transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--rose); }
    .cart-btn {
      position: relative; background: var(--rose); color: #fff;
      border: none; padding: 0.5rem 1.2rem; border-radius: 50px;
      font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; gap: 0.45rem;
      transition: all 0.2s;
    }
    .cart-btn:hover { background: var(--rose-dark); transform: translateY(-1px); }
    .cart-count {
      background: #fff; color: var(--rose);
      border-radius: 50%; width: 19px; height: 19px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 700;
    }

    /* ── BUTTONS ────────────────────────────── */
    .btn-primary {
      background: var(--rose); color: #fff; border: none;
      padding: 0.85rem 2rem; border-radius: 50px;
      font-family: 'DM Sans', sans-serif; font-size: 0.92rem; font-weight: 500;
      cursor: pointer; transition: all 0.25s;
      display: inline-flex; align-items: center; gap: 0.45rem; text-decoration: none;
    }
    .btn-primary:hover { background: var(--rose-dark); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(184,84,105,0.30); }
    .btn-outline {
      background: transparent; color: var(--rose);
      border: 1.5px solid var(--rose); padding: 0.85rem 2rem; border-radius: 50px;
      font-family: 'DM Sans', sans-serif; font-size: 0.92rem; font-weight: 500;
      cursor: pointer; transition: all 0.25s;
      display: inline-flex; align-items: center; gap: 0.45rem;
    }
    .btn-outline:hover { background: var(--rose-pale); transform: translateY(-2px); }
    .back-btn {
      background: none; border: none; color: var(--text-soft);
      font-family: 'DM Sans', sans-serif; font-size: 0.88rem;
      cursor: pointer; padding: 0.4rem 0; display: inline-flex;
      align-items: center; gap: 0.4rem; transition: color 0.2s; margin-bottom: 1.5rem;
    }
    .back-btn:hover { color: var(--rose); }

    /* ── PAGE & ANIMATIONS ──────────────────── */
    #app { min-height: calc(100vh - 65px); }
    .page { animation: fadeUp 0.35s ease both; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(22px); } to { opacity:1; transform:translateY(0); } }
    @keyframes float { 0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-18px) rotate(4deg);} }
    @keyframes pop { 0%{transform:scale(0.5);opacity:0;}80%{transform:scale(1.08);}100%{transform:scale(1);opacity:1;} }
    @keyframes pulseWa { 0%,100%{box-shadow:0 4px 20px rgba(37,211,102,0.35);}50%{box-shadow:0 4px 32px rgba(37,211,102,0.65);} }

    /* ── SECTION HELPERS ────────────────────── */
    .section { padding: 5rem 2rem; max-width: 1200px; margin: 0 auto; }
    .section-header { text-align: center; margin-bottom: 3rem; }
    .section-label {
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--rose); margin-bottom: 0.5rem;
    }
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 600;
      color: var(--dark); line-height: 1.2;
    }

    /* ── HERO ───────────────────────────────── */
    .hero {
      min-height: 88vh; display: flex; align-items: center;
      padding: 4rem 2rem; overflow: hidden; position: relative;
      background: linear-gradient(130deg, var(--beige) 0%, var(--cream) 55%, var(--rose-pale) 100%);
    }
    .hero-content {
      max-width: 580px; position: relative; z-index: 2;
      padding: 2rem; animation: fadeUp 0.8s ease both;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 0.35rem;
      background: var(--rose); color: #fff;
      padding: 0.3rem 0.9rem; border-radius: 50px;
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; margin-bottom: 1.5rem;
    }
    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 6vw, 5rem); font-weight: 600;
      line-height: 1.08; color: var(--dark); margin-bottom: 1rem;
    }
    .hero h1 em { font-style: italic; color: var(--rose); }
    .hero p {
      font-size: 1rem; color: var(--text-soft); line-height: 1.75;
      margin-bottom: 2rem; max-width: 460px;
    }
    .hero-actions { display: flex; gap: 0.85rem; flex-wrap: wrap; }
    .hero-visual {
      position: absolute; right: 0; top: 0; bottom: 0; width: 48%;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .hero-circle {
      width: 520px; height: 520px; border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, var(--rose-soft), var(--rose-pale));
      position: absolute; right: -90px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11rem;
      filter: drop-shadow(0 24px 64px rgba(184,84,105,0.18));
      animation: float 7s ease-in-out infinite;
    }

    /* ── FEATURES STRIP ─────────────────────── */
    .features-strip {
      background: var(--dark); padding: 2.5rem 2rem;
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 2rem;
    }
    .feat { text-align: center; color: var(--cream); }
    .feat-icon { font-size: 1.9rem; margin-bottom: 0.4rem; }
    .feat-title { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; font-weight: 600; color: var(--rose-soft); margin-bottom: 0.2rem; }
    .feat-desc { font-size: 0.78rem; color: rgba(253,248,242,0.55); line-height: 1.5; }

    /* ── CATEGORY PILLS ─────────────────────── */
    .cats { display: flex; gap: 0.65rem; flex-wrap: wrap; justify-content: center; margin-bottom: 2.5rem; }
    .cat-pill {
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.55rem 1.2rem; border-radius: 50px;
      background: #fff; border: 1.5px solid var(--beige);
      color: var(--text); font-size: 0.85rem; font-weight: 500;
      cursor: pointer; transition: all 0.2s;
    }
    .cat-pill:hover, .cat-pill.active {
      background: var(--rose); color: #fff; border-color: var(--rose);
      transform: translateY(-2px); box-shadow: var(--shadow);
    }

    /* ── PRODUCT GRID ───────────────────────── */
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(255px,1fr)); gap: 1.4rem; }
    .pcard {
      background: #fff; border-radius: var(--r); overflow: hidden;
      box-shadow: var(--shadow); transition: all 0.3s; cursor: pointer; position: relative;
    }
    .pcard:hover { transform: translateY(-7px); box-shadow: var(--shadow-lg); }
    .pcard-img-wrap { overflow: hidden; position: relative; }
    .pcard-img {
      width: 100%; aspect-ratio: 4/4.5; background: var(--beige);
      display: flex; align-items: center; justify-content: center;
      font-size: 5.5rem; transition: transform 0.4s;
    }
    .pcard:hover .pcard-img { transform: scale(1.06); }
    .pcard-badge {
      position: absolute; top: 11px; left: 11px;
      background: var(--rose); color: #fff;
      font-size: 0.66rem; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; padding: 0.22rem 0.65rem; border-radius: 50px;
    }
    .pcard-body { padding: 1.15rem; }
    .pcard-cat { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--rose); margin-bottom: 0.25rem; }
    .pcard-name { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 600; color: var(--dark); margin-bottom: 0.35rem; line-height: 1.2; }
    .pcard-price { font-size: 1rem; font-weight: 600; color: var(--rose); margin-bottom: 0.75rem; }
    .pcard-price span { font-size: 0.78rem; color: var(--text-soft); font-weight: 400; }
    .pcard-btn {
      width: 100%; background: var(--rose-pale); color: var(--rose);
      border: none; padding: 0.6rem; border-radius: var(--r-sm);
      font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; letter-spacing: 0.03em;
    }
    .pcard-btn:hover { background: var(--rose); color: #fff; }

    /* ── CTA BANNER ─────────────────────────── */
    .cta-banner {
      background: linear-gradient(135deg, var(--rose) 0%, #7A2940 100%);
      padding: 4rem 2rem; text-align: center;
    }

    /* ── PRODUCT DETAIL ─────────────────────── */
    .pdetail {
      display: grid; grid-template-columns: 1fr 1fr; gap: 4rem;
      padding: 3rem 2rem 5rem; max-width: 1100px; margin: 0 auto;
    }
    .pdetail-img {
      border-radius: var(--r); background: var(--beige);
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      font-size: 10rem; position: sticky; top: 85px;
    }
    .pdetail-info h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.4rem; font-weight: 600; color: var(--dark); margin-bottom: 0.4rem; line-height: 1.15;
    }
    .pdetail-price { font-size: 1.55rem; font-weight: 600; color: var(--rose); margin-bottom: 1.4rem; }
    .pdetail-desc { color: var(--text-soft); line-height: 1.75; font-size: 0.93rem; margin-bottom: 1.8rem; }

    .sel-label { font-size: 0.76rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-soft); margin-bottom: 0.55rem; }
    .size-wrap { margin-bottom: 1.4rem; }
    .size-opts { display: flex; gap: 0.7rem; }
    .size-opt {
      flex: 1; padding: 0.7rem 0.5rem; border: 1.5px solid var(--beige);
      border-radius: var(--r-sm); text-align: center; cursor: pointer; transition: all 0.2s; background: #fff;
    }
    .size-opt:hover, .size-opt.active { border-color: var(--rose); background: var(--rose-pale); }
    .size-opt-name { font-weight: 600; font-size: 0.85rem; color: var(--dark); }
    .size-opt-price { font-size: 0.74rem; color: var(--rose); margin-top: 0.15rem; }

    .addon-wrap { margin-bottom: 1.6rem; }
    .addon-opts { display: flex; flex-direction: column; gap: 0.45rem; }
    .addon-opt {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.9rem; border: 1.5px solid var(--beige);
      border-radius: var(--r-sm); cursor: pointer; background: #fff; transition: all 0.2s;
    }
    .addon-opt:hover { border-color: var(--rose-soft); background: var(--rose-pale); }
    .addon-opt.selected { border-color: var(--rose); background: var(--rose-pale); }
    .addon-opt input { accent-color: var(--rose); }
    .addon-name { flex: 1; font-size: 0.86rem; font-weight: 500; }
    .addon-price { font-size: 0.82rem; color: var(--rose); font-weight: 600; }

    /* ── CART ───────────────────────────────── */
    .cart-page { max-width: 780px; margin: 0 auto; padding: 3.5rem 2rem; }
    .cart-item {
      display: grid; grid-template-columns: 76px 1fr auto;
      gap: 1.1rem; align-items: center; padding: 1.1rem;
      background: #fff; border-radius: var(--r); margin-bottom: 0.9rem; box-shadow: var(--shadow);
    }
    .cart-item-img {
      width: 76px; height: 76px; border-radius: var(--r-sm);
      background: var(--beige); display: flex; align-items: center; justify-content: center; font-size: 2.3rem;
    }
    .cart-item-name { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 600; color: var(--dark); }
    .cart-item-sub { font-size: 0.78rem; color: var(--text-soft); margin-top: 0.2rem; }
    .cart-item-price { font-size: 1.05rem; font-weight: 700; color: var(--rose); text-align: right; }
    .cart-remove {
      background: none; border: none; color: var(--text-soft);
      cursor: pointer; font-size: 0.75rem; margin-top: 0.3rem; transition: color 0.2s; display: block;
    }
    .cart-remove:hover { color: var(--rose); }
    .cart-summary { background: #fff; border-radius: var(--r); padding: 1.4rem; box-shadow: var(--shadow); margin-top: 1.25rem; }
    .cart-total-row { display: flex; justify-content: space-between; align-items: center; font-size: 1.15rem; font-weight: 700; margin-bottom: 1rem; }

    /* ── CHECKOUT ───────────────────────────── */
    .checkout-page { max-width: 620px; margin: 0 auto; padding: 3.5rem 2rem; }
    .form-group { margin-bottom: 1.1rem; }
    .form-label { display: block; font-size: 0.76rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-soft); margin-bottom: 0.38rem; }
    .form-input, .form-select, .form-textarea {
      width: 100%; padding: 0.8rem 0.95rem;
      border: 1.5px solid var(--beige); border-radius: var(--r-sm);
      font-family: 'DM Sans', sans-serif; font-size: 0.92rem; color: var(--text);
      background: #fff; outline: none; transition: border-color 0.2s;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--rose); }
    .form-textarea { resize: vertical; min-height: 76px; }

    .pay-opts { display: flex; flex-direction: column; gap: 0.65rem; margin-top: 0.4rem; }
    .pay-opt {
      display: flex; align-items: center; gap: 0.9rem;
      padding: 0.85rem 1.1rem; border: 1.5px solid var(--beige);
      border-radius: var(--r-sm); cursor: pointer; background: #fff; transition: all 0.2s;
    }
    .pay-opt:hover, .pay-opt.sel { border-color: var(--rose); background: var(--rose-pale); }
    .pay-opt input { accent-color: var(--rose); }
    .pay-name { font-weight: 600; font-size: 0.92rem; }
    .pay-desc { font-size: 0.74rem; color: var(--text-soft); }
    .order-summary-box { background: var(--beige); border-radius: var(--r-sm); padding: 1.15rem; margin-bottom: 1.4rem; }
    .sum-row { display: flex; justify-content: space-between; font-size: 0.86rem; margin-bottom: 0.4rem; }
    .sum-total { font-size: 1rem; font-weight: 700; }

    /* ── CONFIRM ────────────────────────────── */
    .confirm-page { text-align: center; padding: 5rem 2rem; max-width: 580px; margin: 0 auto; }
    .confirm-icon { font-size: 5rem; margin-bottom: 1.4rem; animation: pop 0.5s ease both; }
    .confirm-title { font-family: 'Cormorant Garamond', serif; font-size: 2.4rem; font-weight: 600; color: var(--dark); margin-bottom: 0.8rem; }
    .confirm-id { background: var(--rose-pale); color: var(--rose); border-radius: var(--r-sm); padding: 0.4rem 1rem; font-weight: 700; display: inline-block; margin-bottom: 1.4rem; font-family: monospace; font-size: 0.95rem; }
    .confirm-box { background: #fff; border-radius: var(--r); padding: 1.4rem; text-align: left; box-shadow: var(--shadow); margin-bottom: 1.8rem; }
    .confirm-row { display: flex; gap: 0.5rem; font-size: 0.86rem; margin-bottom: 0.45rem; }
    .confirm-row strong { min-width: 90px; color: var(--dark); }
    .confirm-row span { color: var(--text-soft); }

    /* ── ABOUT / CONTACT ────────────────────── */
    .about-hero { background: linear-gradient(135deg, var(--rose-pale), var(--beige)); padding: 5rem 2rem; text-align: center; }
    .contact-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(240px,1fr)); gap: 1.25rem; }
    .ccard { background: #fff; border-radius: var(--r); padding: 2rem; text-align: center; box-shadow: var(--shadow); }
    .ccard-icon { font-size: 2.2rem; margin-bottom: 0.7rem; }
    .ccard-title { font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; font-weight: 600; color: var(--dark); margin-bottom: 0.4rem; }
    .ccard-val { color: var(--text-soft); font-size: 0.88rem; line-height: 1.65; }

    /* ── ADMIN ──────────────────────────────── */
    .admin-login { max-width: 400px; margin: 5rem auto; background: #fff; border-radius: var(--r); padding: 2.5rem; box-shadow: var(--shadow-lg); text-align: center; }
    .admin-panel { max-width: 1100px; margin: 0 auto; padding: 2rem; }
    .admin-stats { display: grid; grid-template-columns: repeat(auto-fit,minmax(150px,1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: #fff; border-radius: var(--r); padding: 1.2rem; box-shadow: var(--shadow); text-align: center; }
    .stat-icon { font-size: 1.6rem; }
    .stat-val { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 600; color: var(--dark); }
    .stat-label { font-size: 0.72rem; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.08em; }

    .admin-tabs { display: flex; gap: 0.4rem; border-bottom: 2px solid var(--beige); padding-bottom: 0; margin-bottom: 1.75rem; }
    .atab {
      padding: 0.7rem 1.4rem; background: none; border: none;
      font-family: 'DM Sans', sans-serif; font-size: 0.86rem; font-weight: 500;
      cursor: pointer; color: var(--text-soft);
      border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s;
    }
    .atab.active { color: var(--rose); border-bottom-color: var(--rose); }

    .atable { width: 100%; border-collapse: collapse; background: #fff; border-radius: var(--r); overflow: hidden; box-shadow: var(--shadow); }
    .atable th { background: var(--dark); color: var(--cream); padding: 0.8rem 1.1rem; text-align: left; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }
    .atable td { padding: 0.85rem 1.1rem; border-bottom: 1px solid var(--beige); font-size: 0.84rem; color: var(--text); vertical-align: middle; }
    .atable tr:last-child td { border-bottom: none; }
    .atable tr:hover td { background: var(--cream); }

    .badge { padding: 0.2rem 0.65rem; border-radius: 50px; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
    .badge-proc { background: #FFF3CD; color: #7A5800; }
    .badge-out  { background: #D1ECF1; color: #0C5460; }
    .badge-done { background: #D4EDDA; color: #155724; }

    /* ── EMPTY STATE ────────────────────────── */
    .empty { text-align: center; padding: 4rem 2rem; color: var(--text-soft); }
    .empty-icon { font-size: 3.5rem; margin-bottom: 0.9rem; }
    .empty h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.45rem; color: var(--dark); margin-bottom: 0.4rem; }
    .empty p { font-size: 0.88rem; }

    /* ── FOOTER ─────────────────────────────── */
    footer { background: var(--dark); color: rgba(253,248,242,0.65); padding: 3rem 2rem; text-align: center; }
    .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.9rem; color: var(--rose-soft); margin-bottom: 0.6rem; }
    .footer-links { display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap; margin: 1rem 0; }
    .footer-links a { color: rgba(253,248,242,0.5); text-decoration: none; font-size: 0.82rem; cursor: pointer; transition: color 0.2s; }
    .footer-links a:hover { color: var(--rose-soft); }
    .footer-info { font-size: 0.8rem; margin-top: 0.75rem; }
    .footer-copy { font-size: 0.72rem; opacity: 0.35; margin-top: 0.75rem; }

    /* ── WHATSAPP FAB ───────────────────────── */
    .wa-fab {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 999;
      background: #25D366; color: #fff; border: none; border-radius: 50px;
      padding: 0.8rem 1.3rem;
      font-family: 'DM Sans', sans-serif; font-size: 0.84rem; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; gap: 0.45rem;
      box-shadow: 0 4px 20px rgba(37,211,102,0.35);
      transition: all 0.25s; animation: pulseWa 3s ease-in-out infinite;
    }
    .wa-fab:hover { transform: scale(1.05) translateY(-2px); box-shadow: 0 8px 32px rgba(37,211,102,0.55); }

    /* ── RESPONSIVE ─────────────────────────── */
    @media (max-width: 768px) {
      nav { padding: 0.85rem 1rem; }
      .nav-links { display: none; }
      .hero { min-height: 72vh; }

function navigate(p, data) {
  page = p;
  if (p === 'product' && data != null) { currentProdId = data; selectedSize = null; }
  if (p === 'confirm' && data != null) { currentOrder = data; }
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ════════════════════════════════════════════════
//  CART HELPERS
// ════════════════════════════════════════════════
function saveCart()   { localStorage.setItem('daisy_cart',   JSON.stringify(cart));   syncCartCount(); }
function saveOrders() { localStorage.setItem('daisy_orders', JSON.stringify(orders)); }

function syncCartCount() {
  const el = document.getElementById('cartCount');
  if (el) el.textContent = cart.length;
}

function cartTotal()    { return cart.reduce((s,i)=>s+i.price,0); }
function deliveryFee()  { return cartTotal() >= 1500 ? 0 : 100; }
function orderTotal()   { return cartTotal() + deliveryFee(); }

function addToCart(prodId, size, addonIds) {
  const p = PRODUCTS.find(x=>x.id===prodId);
  const ads = ADDONS.filter(a=>addonIds.includes(a.id));
  const addonCost = ads.reduce((s,a)=>s+a.price,0);
  cart.push({
    uid: Date.now() + Math.random(),
    prodId, size,
    name: p.name, emoji: p.emoji,
    price: p.sizes[size] + addonCost,
    addons: ads.map(a=>a.name),
  });
  saveCart();
  toast('Added to cart 🛒');
}

function removeFromCart(uid) {
  cart = cart.filter(i=>i.uid!==uid);
  saveCart();
  render();
}

// ════════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════════
function toast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:5.5rem;left:50%;transform:translateX(-50%);background:#1C1212;color:#FDF8F2;padding:0.7rem 1.4rem;border-radius:50px;font-size:0.84rem;font-weight:500;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.2);animation:fadeUp 0.3s ease;white-space:nowrap;';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2400);
}

}

                <span class="addon-name">${a.name}</span>
                <span class="addon-price">+Rs. ${a.price}</span>
              </label>
            `).join('')}
          </div>
        </div>

        <button class="btn-primary" style="width:100%;justify-content:center;padding:0.95rem;margin-bottom:0.65rem;" onclick="doAddToCart(${p.id})">Add to Cart 🛒</button>

}

function onSizeClick(el, size, price) {
  document.querySelectorAll('.size-opt').forEach(o=>o.classList.remove('active'));
  el.classList.add('active');
  selectedSize = { size, price };
  refreshDetailPrice();
}

function onAddonChange(id) {
  const el = document.getElementById(id);
  const cb = el.querySelector('input[type=checkbox]');
  el.classList.toggle('selected', cb.checked);
  refreshDetailPrice();
}

function refreshDetailPrice() {
  const p = PRODUCTS.find(x=>x.id===currentProdId);
  if (!p) return;
  const base = selectedSize ? selectedSize.price : p.base;
  const extra = ADDONS.filter(a=>{
    const cb = document.querySelector(`input[value="${a.id}"]`);
    return cb && cb.checked;
  }).reduce((s,a)=>s+a.price,0);
  const el = document.getElementById('detailPrice');
  if (el) el.textContent = `Rs. ${(base+extra).toLocaleString()}`;
}

function doAddToCart(id) {
  const p = PRODUCTS.find(x=>x.id===id);
  const size = selectedSize ? selectedSize.size : Object.keys(p.sizes)[0];
  const addonIds = ADDONS.filter(a=>{
    const cb = document.querySelector(`input[value="${a.id}"]`);
    return cb && cb.checked;
  }).map(a=>a.id);
  addToCart(id, size, addonIds);
}

          <div><div class="pay-name">💵 Cash on Delivery</div><div class="pay-desc">Pay when your bouquet arrives</div></div>
        </label>
        <label class="pay-opt" id="pop-digi">
          <input type="radio" name="pay" value="digital" onchange="selPay('pop-digi')">
          <div><div class="pay-name">📱 eSewa / Khalti</div><div class="pay-desc">Coming soon</div></div>
        </label>
      </div>
    </div>

      <div class="sum-row"><span>Items (${cart.length})</span><span>Rs. ${cartTotal().toLocaleString()}</span></div>
      <div class="sum-row"><span>Delivery</span><span>${deliveryFee()===0?'<span style="color:var(--sage);font-weight:600;">Free</span>':'Rs. 100'}</span></div>
      <hr style="border:none;border-top:1px solid var(--rose-soft);margin:0.6rem 0;">
      <div class="sum-row sum-total"><span>Total</span><span style="color:var(--rose);">Rs. ${orderTotal().toLocaleString()}</span></div>
    </div>

    <button class="btn-primary" style="width:100%;justify-content:center;padding:0.95rem;" onclick="placeOrder()">Place Order 🌸</button>
  </div>`;
}

function selPay(id) {
  document.querySelectorAll('.pay-opt').forEach(o=>o.classList.remove('sel'));
  document.getElementById(id).classList.add('sel');
}

function placeOrder() {
  const name  = document.getElementById('co-name').value.trim();
  const phone = document.getElementById('co-phone').value.trim();
  const addr  = document.getElementById('co-addr').value.trim();
  const date  = document.getElementById('co-date').value;
  if (!name||!phone||!addr||!date) { toast('Please fill all required fields ⚠️'); return; }

  const pay = document.querySelector('input[name="pay"]:checked').value;
  const id  = 'DSY' + Date.now().toString().slice(-6);
  const order = { id, name, phone, addr, date, msg: document.getElementById('co-msg').value.trim(), pay, items:[...cart], total: orderTotal(), status:'Processing', placed: new Date().toLocaleDateString('en-NP') };
  orders.unshift(order);
  saveOrders();
  cart = []; saveCart();
  navigate('confirm', order);
}

function updateStatus(id, status) {
  const o = orders.find(x=>x.id===id);
  if (o) { o.status=status; saveOrders(); toast(`${id} → ${status} ✓`); setTimeout(render,250); }
}

// ════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════
// ════════════════════════════════════════════════
//  INIT — load products from GitHub then render
// ════════════════════════════════════════════════
async function initApp() {
  // Show loading overlay while fetching
  document.getElementById('app').innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:1rem;color:var(--text-soft);">
      <div style="font-size:2.5rem;animation:spin 1s linear infinite;">🌸</div>
      <p style="font-size:0.9rem;">Loading bouquets…</p>
    </div>`;

  try {
    const resp = await fetch(GITHUB_RAW + '?t=' + Date.now());
    if (resp.ok) {
      PRODUCTS = await resp.json();
    } else {
      PRODUCTS = DEFAULT_PRODUCTS;
    }
  } catch(e) {
    PRODUCTS = DEFAULT_PRODUCTS;
  }

  syncCartCount();
  render();
}

// Add spin animation
const style = document.createElement('style');
style.textContent = '@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}';
document.head.appendChild(style);

initApp();
</script>
